<style>
  :root{
    --navy:#1F2A4D;
    --tan:#C2A582;
    --sage:#E8EDD8;
    --cream:#F5F1E8;
    --white:#FFFFFF;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{
    margin:0; padding:0; min-height:100%;
    font-family:'Jost', sans-serif;
    color: var(--navy);
  }
  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding: 56px 22px 40px;
    background:
      radial-gradient(circle at 18% 8%, rgba(194,165,130,0.14), transparent 42%),
      radial-gradient(circle at 85% 92%, rgba(232,237,216,0.9), transparent 48%),
      #FCFBF8;
  }

  .logo{
    width: 220px;
    display:block;
  }
  .logo svg{ width:100%; height:auto; display:block; }

  .tagline{
    font-family:'Jost', sans-serif;
    font-weight:400;
    font-size: 11.5px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--tan);
    text-align:center;
    margin: 20px 0 40px;
  }

  .panel{
    width:100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .tool{
    display:flex;
    align-items:center;
    gap: 16px;
    width:100%;
    padding: 18px 20px;
    background: var(--white);
    border: 1px solid rgba(31,42,77,0.06);
    border-radius: 16px;
    text-decoration:none;
    color: var(--navy);
    box-shadow: 0 1px 2px rgba(31,42,77,0.04);
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }
  .tool:hover{
    transform: translateY(-2px);
    box-shadow: 0 14px 28px -16px rgba(31,42,77,0.22);
    border-color: rgba(194,165,130,0.35);
  }
  .tool:active{
    transform: translateY(0);
    background: var(--sage);
  }
  .tool:focus-visible{
    outline: 2px solid var(--tan);
    outline-offset: 2px;
  }

  .tool-icon{
    flex: 0 0 auto;
    width: 42px;
    height: 42px;
    border-radius: 11px;
    background: var(--sage);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .tool-icon svg{
    width: 20px;
    height: 20px;
    stroke: var(--navy);
    fill: none;
  }

  .tool-text{ flex:1 1 auto; min-width:0; }
  .tool-name{
    font-family:'Jost', sans-serif;
    font-weight:500;
    font-size: 15px;
    color: var(--navy);
    margin:0;
  }
  .tool-desc{
    font-family:'Jost', sans-serif;
    font-weight:300;
    font-size: 12.5px;
    color: rgba(31,42,77,0.5);
    margin: 3px 0 0;
  }

  .tool-arrow{
    flex: 0 0 auto;
    width: 15px;
    height: 15px;
    stroke: var(--tan);
    fill: none;
    opacity: 0.85;
  }

  footer{
    margin-top: 40px;
    font-family:'Jost', sans-serif;
    font-weight: 300;
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(31,42,77,0.32);
    text-align:center;
  }

  @media (prefers-reduced-motion: no-preference){
    .logo, .tagline, .panel > *{ animation: rise 0.6s ease both; }
    .tagline{ animation-delay: 0.05s; }
    .panel > *:nth-child(1){ animation-delay: 0.12s; }
    .panel > *:nth-child(2){ animation-delay: 0.19s; }
    .panel > *:nth-child(3){ animation-delay: 0.26s; }
    .panel > *:nth-child(4){ animation-delay: 0.33s; }
    .panel > *:nth-child(5){ animation-delay: 0.40s; }
    @keyframes rise{
      from{ opacity:0; transform: translateY(8px); }
      to{ opacity:1; transform: translateY(0); }
    }
  }
</style>
